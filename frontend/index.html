<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23050816' stroke='%233B82F6' stroke-width='3'/><circle cx='50' cy='50' r='12' fill='%233B82F6'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StadiumVerse Intelligence OS · FIFA World Cup 2026 Smart Stadiums & Tournament Operations</title>
    <meta name="description" content="AI Native Stadium Intelligence Platform for FIFA World Cup 2026 - Challenge 4: Smart Stadiums & Tournament Operations" />
    <meta name="keywords" content="stadium, ai, digital-twin, fifa, world-cup, crowd-simulation, predictive-analytics, smart-stadiums, tournament-operations, challenge-4" />
    
    <!-- FIFA World Cup 2026 Theme Colors -->
    <meta name="theme-color" content="#003366" />
    <meta name="msapplication-navbutton-color" content="#003366" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="StadiumVerse Intelligence OS - The Living Brain" />
    <meta property="og:description" content="AI Native Stadium Intelligence Platform for FIFA World Cup 2026 - Challenge 4: Smart Stadiums & Tournament Operations" />
    <meta property="og:url" content="http://localhost:3000" />
    
    <!-- Preload Critical Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Favicon fallback -->
    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: white;
        min-height: 100vh;
      }
      
      /* Loading state */
      #root {
        min-height: 100vh;
      }
      
      /* Prevent flash of unstyled content */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      
      .loading-content {
        text-align: center;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(59, 130, 246, 0.2);
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem auto;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loading-text {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
      }
      
      .loading-subtitle {
        font-size: 1rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <!-- Initial loading screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🧠</div>
        <div class="loading-spinner"></div>
        <div class="loading-text">StadiumVerse Intelligence OS</div>
        <div class="loading-subtitle">"The Living Brain of the Stadium"</div>
      </div>
    </div>
    
    <!-- React root -->
    <div id="root"></div>
    
    <!-- Main application script -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Remove loading screen when React loads -->
    <script>
      // Hide loading screen when React app is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            setTimeout(function() {
              loadingScreen.remove();
            }, 500);
          }
        }, 1000);
      });
      
      // Fallback: remove loading screen after 5 seconds
      setTimeout(function() {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.remove();
        }
      }, 5000);
    </script>
  </body>
</html>
