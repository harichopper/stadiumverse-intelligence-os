# StadiumVerse AI - Complete Docker Compose Setup
# FIFA World Cup 2026 Stadium Digital Twin System

version: '3.8'

services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: stadiumverse-postgres
    environment:
      POSTGRES_DB: stadiumverse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stadiumverse"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stadiumverse-network

  # Redis for Caching and WebSocket Sessions
  redis:
    image: redis:7-alpine
    container_name: stadiumverse-redis
    command: redis-server --appendonly yes --requirepass redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stadiumverse-network

  # FastAPI Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stadiumverse-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/stadiumverse
      - REDIS_URL=redis://:redis_password@redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your-openai-api-key}
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-this-in-production}
      - ENVIRONMENT=production
      - DEBUG=False
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - stadiumverse-network

  # React Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stadiumverse-frontend
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - VITE_WS_URL=ws://localhost:8000/ws
      - NODE_ENV=production
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - stadiumverse-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: stadiumverse-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/docker/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - stadiumverse-network

  # AI Model Services (Optional for enhanced AI features)
  ai-services:
    build:
      context: ./ai-agents
      dockerfile: Dockerfile
    container_name: stadiumverse-ai
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your-openai-api-key}
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/stadiumverse
      - REDIS_URL=redis://:redis_password@redis:6379/1
    volumes:
      - ./ai-agents:/app
      - ai_models:/app/models
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - stadiumverse-network

  # Monitoring and Analytics
  prometheus:
    image: prom/prometheus:latest
    container_name: stadiumverse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - stadiumverse-network

  grafana:
    image: grafana/grafana:latest
    container_name: stadiumverse-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - stadiumverse-network

  # Development Tools (Only for development environment)
  adminer:
    image: adminer:latest
    container_name: stadiumverse-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    profiles:
      - dev
    networks:
      - stadiumverse-network

  # Mail Server for Notifications (Optional)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: stadiumverse-mail
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    profiles:
      - dev
    networks:
      - stadiumverse-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai_models:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  stadiumverse-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16